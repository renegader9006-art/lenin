<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Участники - Международная Ассоциация «Метро»</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/party.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <div class="wrapper">
        <div class="content">
            <section class="hero">
                <div id="header-block"></div>

                <div class="hero__container container">
                    <h1 class="hero__title">УЧАСТНИКИ</h1>
                    <p class="hero__subtitle">Международная ассоциация «Метро» объединяет метрополитены России и стран СНГ, построенные и эксплуатируемые по одному технологическому принципу, а также предприятия-производители подвижного состава и оборудования для нужд метрополитенов</p>
                </div>
                <img class="hero__img" src="img/background-pattern1.png" alt="">
            </section>

            <section class="participants" id="metro">
                <div class="metro-section">
                    <div class="container">
                        <h2 class="section-title section-title--underline">Метрополитены</h2>
                        <div class="metro-grid" id="metro-grid"></div>
                    </div>
                </div>

                <div class="predpriyatiya-section" id="companies">
                    <div class="container">
                        <h2 class="section-title section-title--underline">Предприятия</h2>
                        <div class="predpriyatiya-grid" id="predpriyatiya-grid"></div>
                    </div>
                </div>

            </section>

            <div id="footer-block"></div>
        </div>
    </div>

    <div class="metro-modal" id="metroModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-container">
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script src="js/party.js?v=3"></script>
    <script src="js/header.js"></script>
</body>
</html>

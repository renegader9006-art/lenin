<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Международная Ассоциация «Метро»</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/contacts.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <div class="wrapper">
        <div class="content">
            <section class="hero hero--contacts">
                <div id="header-block"></div>

                <div class="hero__container container">
                    <h1 class="hero__title" data-locale-key="название">КОНТАКТЫ</h1>
                </div>
                <img class="hero__img" src="img/background-pattern1.png" alt="">
            </section>

            <section class="contacts-section">
                <div class="contacts__container container">
                    <div class="contacts__info">
                        <div class="contacts__item" data-contact-type="адрес">
                            <span class="contacts__label" data-locale-key="адрес">Адрес:</span>
                            <span class="contacts__value" data-locale-value="адрес">129110, г. Москва, улица Щепкина, дом № 58, строение 3</span>
                        </div>
                        <div class="contacts__item" data-contact-type="телефон">
                            <span class="contacts__label" data-locale-key="телефон">Телефон:</span>
                            <a href="tel:+74956810203" class="contacts__value contacts__link" data-locale-value="телефон">+7 (495) 681-02-03</a>
                        </div>
                        <div class="contacts__item" data-contact-type="почта">
                            <span class="contacts__label" data-locale-key="почта">E-mail:</span>
                            <a href="mailto:info@asmetro.ru" class="contacts__value contacts__link" data-locale-value="почта">info@asmetro.ru</a>
                        </div>
                        <div class="contacts__item" data-contact-type="телеграм">
                            <span class="contacts__label" data-locale-key="телеграм">Канал в телеграм:</span>
                            <a href="https://t.me/intermetroassc" target="_blank" class="contacts__value contacts__link" data-locale-value="телеграм">t@me/intermetroassc</a>
                        </div>
                    </div>
                </div>
            </section>

            <div id="footer-block"></div>
        </div>
    </div>
    <script src="js/header-loader.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/contacts.js"></script>
</body>
</html>
